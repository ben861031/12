<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公司通用問卷調查系統 v1.1</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="css/app.css?v=1.1">
</head>
<body>
  <div id="toast" class="toast"></div>
  <div id="front" class="frontShell">
    <header class="frontHeader"><img src="assets/company-logo.png" alt="環興科技股份有限公司"><div class="frontActions"><span id="formStatus" class="statusPill">載入中</span><button class="ghostBtn" onclick="openAdmin()">管理登入</button></div></header>
    <main id="frontMain" class="frontMain"><div class="loading">正在載入問卷…</div></main>
  </div>

  <div id="loginMask" class="modalMask">
    <div class="loginCard"><img src="assets/company-logo.png" alt="環興科技股份有限公司"><button id="loginBtn" class="btn primary wide" onclick="loginGoogle()">使用 Google 登入</button><button class="btn link" onclick="closeLogin()">取消</button><p id="loginMsg" class="errorText"></p></div>
  </div>

  <div id="admin" class="adminShell">
    <aside class="sidebar">
      <img src="assets/company-logo.png" alt="環興科技股份有限公司">
      <div class="adminIdentity"><b>通用問卷後台</b><small id="adminUser"></small></div>
      <button class="nav active" onclick="showPanel('formsPanel',this)">問卷管理</button>
      <button class="nav" onclick="showPanel('editorPanel',this);startNewForm()">新增問卷</button>
      <button class="nav" onclick="showPanel('resultsPanel',this)">填寫結果</button>
      <button class="nav" onclick="copyFormLink()">複製前台網址</button>
      <button class="nav" onclick="showFront()">查看前台</button>
      <button class="nav" onclick="logout()">登出</button>
    </aside>
    <main class="adminMain">
      <header class="adminHead"><div><h1 id="panelTitle">問卷管理</h1><p id="activeFormLabel">尚未選擇問卷</p></div><select id="activeFormSelect" onchange="selectForm(this.value)"></select></header>

      <section id="formsPanel" class="panel active">
        <div class="summaryGrid"><div class="metric"><span>問卷總數</span><b id="formCount">0</b></div><div class="metric"><span>目前問卷</span><b id="currentFormName">—</b></div><div class="metric"><span>已填份數</span><b id="responseCount">0</b></div></div>
        <div class="card"><div class="sectionHead"><div><h2>問卷列表</h2><p>各問卷都有獨立前台網址，資料彼此分開。</p></div><div class="buttonRow"><button class="btn" onclick="createUniformTemplate()">建立外套尺寸範本</button><button class="btn primary" onclick="showPanel('editorPanel');startNewForm()">＋ 新增空白問卷</button></div></div><div id="formsTable"></div></div>
      </section>

      <section id="editorPanel" class="panel">
        <div class="card"><div class="sectionHead"><div><h2 id="editorHeading">新增問卷</h2><p>可建立文字、選項、下拉與圖片說明題目。</p></div><span id="editorMode" class="modeBadge">新增模式</span></div>
          <div class="formGrid"><label>問卷標題<span>*</span><input id="formTitle" placeholder="例如：員工制服尺寸調查"></label><label>截止時間<input id="formDeadline" type="datetime-local"></label><label>狀態<select id="formState"><option value="draft">草稿</option><option value="open">開放填寫</option><option value="closed">已關閉</option></select></label></div>
          <label>問卷說明<textarea id="formDescription" placeholder="請輸入填寫目的、期間與注意事項"></textarea></label>
          <label>頁首參考圖片網址<input id="formImageUrl" placeholder="https://...（可空白）"></label>
          <div class="questionHead"><h3>題目設定</h3><button class="btn primary" onclick="addQuestion()">＋ 新增題目</button></div><div id="questionEditor"></div>
          <div class="buttonRow stickyActions"><button id="saveFormBtn" class="btn primary" onclick="saveForm()">建立問卷</button><button class="btn" onclick="cancelEdit()">取消</button></div>
        </div>
      </section>

      <section id="resultsPanel" class="panel">
        <div class="card"><div class="sectionHead"><div><h2>填寫結果</h2><p id="resultCaption">請先選擇問卷。</p></div><div class="buttonRow"><button class="btn" onclick="copyFormLink()">複製問卷網址</button><button class="btn success" onclick="exportResults()">Excel 匯出</button></div></div><div id="resultsTable"></div></div>
      </section>
    </main>
  </div>
  <script src="js/config.js?v=1.1"></script>
  <script src="js/app.js?v=1.1"></script>
</body>
</html>
